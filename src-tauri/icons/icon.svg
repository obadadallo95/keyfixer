<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="100%" height="100%">
  <defs>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .font-logo { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; font-weight: 900; }
  </style>

  <!-- Icon: Two keycaps swapping -->
  <g transform="translate(10, 15)">
    <!-- Background key -->
    <rect x="0" y="10" width="36" height="36" rx="8" fill="#0f172a" stroke="#334155" stroke-width="2" />
    <text x="18" y="34" fill="#64748b" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle">ع</text>
    
    <!-- Foreground key -->
    <rect x="18" y="0" width="36" height="36" rx="8" fill="#050505" stroke="url(#amberGrad)" stroke-width="2.5" filter="url(#glow)" />
    <!-- Arrow -->
    <path d="M 28 18 H 40 M 36 14 L 40 18 L 36 22" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>

  <!-- Wordmark -->
  <text x="80" y="52" class="font-logo" font-size="36" letter-spacing="-1">
    <tspan fill="#f8fafc">Key</tspan><tspan fill="#fbbf24">Fixer</tspan>
  </text>
</svg>
