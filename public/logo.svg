<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
  <defs>
    <linearGradient id="goldG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="keyG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2D2D35"/>
      <stop offset="100%" stop-color="#16161A"/>
    </linearGradient>
  </defs>

  <!-- Keycap Badge -->
  <g>
    <rect x="0" y="8" width="64" height="64" rx="16" ry="16" fill="#0D0D10"/>
    <rect x="0" y="6" width="64" height="64" rx="16" ry="16" fill="url(#keyG)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    
    <!-- ع Glyph -->
    <text x="17" y="47" font-family="'SF Arabic', 'Noto Naskh Arabic', sans-serif" font-size="28" font-weight="900" fill="url(#goldG)">ع</text>
    
    <!-- Arrows -->
    <path d="M 28 32 L 36 32 M 30 29 L 27 32 L 30 35 M 34 37 L 37 40 L 34 43 M 28 40 L 36 40" stroke="url(#goldG)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- A Glyph -->
    <text x="47" y="46" font-family="'SF Pro Display', sans-serif" font-size="26" font-weight="900" fill="url(#goldG)">A</text>
  </g>

  <!-- Wordmark KeyFixer -->
  <text x="82" y="52" font-family="'SF Pro Display', system-ui, -apple-system, sans-serif" font-size="34" font-weight="800" letter-spacing="-0.5">
    <tspan fill="#FFFFFF" opacity="0.95">Key</tspan><tspan fill="#F59E0B">Fixer</tspan>
  </text>
</svg>
