<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KeyFixer</title>
    <style>
      /* Remove all default browser margins for the frameless transparent window */
      html, body, #desktop-root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
      [data-tauri-drag-region] {
        -webkit-app-region: drag;
      }
      button, input, textarea, a, select, [data-tauri-no-drag] {
        -webkit-app-region: no-drag;
      }
    </style>
  </head>
  <body>
    <div id="desktop-root"></div>
    <script type="module" src="/src/desktop-main.tsx"></script>
  </body>
</html>
